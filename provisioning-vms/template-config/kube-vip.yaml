apiVersion: v1
kind: Pod
metadata:
  creationTimestamp: null
  name: kube-vip
  namespace: kube-system
spec:
  hostNetwork: true
  containers:
  - args:
    - manager
    env:
      - name: vip_arp
        value: "true"
      - name: port
        value: "6443"
      - name: vip_interface
        value: "__PRIMARY_IFACE__"
      - name: vip_cidr
        value: "32"
      - name: cp_enable
        value: "true"
      - name: cp_namespace
        value: kube-system
      - name: vip_ddns
        value: "false"
      - name: vip_leaderelection
        value: "true"
      - name: vip_leasename
        value: plndr-cp-lock
      - name: vip_leaseduration
        value: "5"
      - name: vip_renewdeadline
        value: "3"
      - name: vip_retryperiod
        value: "1"
      - name: address
        value: "${VIP_ADDRESS}"
      - name: prometheus_server
        value: ":2112"
      - name: KUBECONFIG
        value: "/etc/kubernetes/admin.conf"
      - name: vip_kubeconfig
        value: "/etc/kubernetes/admin.conf"
    image: ghcr.io/kube-vip/kube-vip:v0.8.0
    imagePullPolicy: IfNotPresent
    name: kube-vip
    securityContext:
      capabilities:
        add:
        - NET_ADMIN
        - NET_RAW
        - SYS_TIME
    volumeMounts:
    - mountPath: /etc/kubernetes
      name: kubeconfig 
  volumes:
  - name: kubeconfig
    hostPath:
      path: /etc/kubernetes
