---
- name: Initialize the cluster with kubeadm
  command: >
    kubeadm init
    --control-plane-endpoint "{{ ansible_facts['env']['VIP_ADDRESS'] }}:6443"
    --apiserver-advertise-address "{{ ansible_facts['default_ipv4']['address'] }}"
    --upload-certs
    --pod-network-cidr=192.168.0.0/16
  register: kubeadm_init
  when: 
    - not kubeadm_conf.stat.exists
    - ansible_facts['env']['VIP_ADDRESS'] is defined

- name: Setup kubeconfig for ansible user
  block:
    - name: Create .kube directory
      file:
        path: "{{ kube_home }}/.kube"
        state: directory
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"
        mode: '0755'

    - name: Copy admin.conf to user home
      copy:
        src: /etc/kubernetes/admin.conf
        dest: "{{ kube_home }}/.kube/config"
        remote_src: yes
        owner: "{{ kube_user }}"
        group: "{{ kube_user }}"
        mode: '0600'

    - name: Fetch kubeconfig to local management machine
      fetch:
        src: /etc/kubernetes/admin.conf
        dest: "~/.kube/k8s_ansible_config"
        flat: yes
  when: (kubeadm_init is changed) or (kubeadm_conf.stat.exists)
